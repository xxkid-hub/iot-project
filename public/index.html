<!DOCTYPE html>
<html>
<head>
  <title>Smart Plant Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #06131a, #02070c);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    h1 {
      margin: 20px;
      color: #00ff9f;
      text-shadow: 0 0 20px #00ff9f, 0 0 40px #00ff9f;
    }

    /* 🌈 Neon swirl glow background */
    body::before {
      content: "";
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,255,150,0.2), transparent);
      top: -200px;
      left: -200px;
      filter: blur(100px);
      z-index: -1;
    }

    body::after {
      content: "";
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,150,255,0.2), transparent);
      bottom: -200px;
      right: -200px;
      filter: blur(100px);
      z-index: -1;
    }

    button {
      margin: 5px;
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: #00ff9f;
      color: black;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px #00ff9f;
    }

    button:hover {
      background: #00cc7a;
    }

    .main {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .left {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: rgba(0,255,150,0.05);
      border: 1px solid rgba(0,255,150,0.3);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,255,150,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0,255,150,0.6);
    }

    .value {
      font-size: 2rem;
      margin-top: 10px;
    }

    .pump-on { color: #00ff9f; }
    .pump-off { color: #ff4d6d; }

    .graph {
      width: 650px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,255,150,0.2);
    }

    canvas {
      width: 100% !important;
      height: 300px !important;
    }

    /* 🔥 Description boxes */
    .desc-container {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .desc-box {
      flex: 1;
      min-width: 180px;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      text-align: left;
      background: rgba(0,255,150,0.05);
      border: 1px solid rgba(0,255,150,0.3);
      box-shadow: 0 0 10px rgba(0,255,150,0.3);
    }

    .desc-box:nth-child(2) {
      border-color: rgba(0,150,255,0.5);
      box-shadow: 0 0 10px rgba(0,150,255,0.5);
    }

    .desc-box:nth-child(3) {
      border-color: rgba(200,0,255,0.5);
      box-shadow: 0 0 10px rgba(200,0,255,0.5);
    }

    .alert {
      margin-top: 10px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<h1>🌱 Smart Plant Control Panel</h1>
<p id="clock"></p>

<div class="main">

  <!-- LEFT -->
  <div class="left">

    <div class="card">
      <h3>💧 Moisture</h3>
      <div class="value" id="moisture">--</div>
      <div id="status"></div>
    </div>

    <div class="card">
      <h3>🚿 Pump</h3>
      <div class="value" id="pump">--</div>

      <button onclick="turnPumpOn()">ON</button>
      <button onclick="turnPumpOff()">OFF</button>
      <button onclick="autoMode()">AUTO</button>

      <div id="mode">Mode: AUTO</div>
    </div>

    <div class="card">
      <h3>📊 Stats</h3>
      <div id="avg"></div>
      <div id="min"></div>
      <div id="max"></div>
      <div id="pumpCount"></div>
    </div>

    <div class="alert" id="alert"></div>

  </div>

  <!-- RIGHT -->
  <div>

    <div class="graph">
      <canvas id="chart"></canvas>
    </div>

    <!-- 🔥 Separate description boxes -->
    <div class="desc-container">

      <div class="desc-box">
        💧 <b>Moisture</b><br>
        Measures soil water level. Low = dry soil, high = wet soil.
      </div>

      <div class="desc-box">
        🚿 <b>Pump</b><br>
        Supplies water. Turns ON when soil is dry and OFF when moisture is enough.
      </div>

      <div class="desc-box">
        🤖 <b>Mode</b><br>
        AUTO = automatic watering, MANUAL = user control.
      </div>

    </div>

  </div>

</div>

<script>
let currentMoisture = 1500;
let manualPump = null;
let history = [];
let pumpCount = 0;
let lastPumpState = "OFF";

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Moisture',
      data: [],
      borderColor: '#00ff9f',
      tension: 0.4
    }]
  }
});

function generateMoisture() {
  let change = Math.floor(Math.random() * 200 - 100);
  currentMoisture += change;
  if (currentMoisture < 200) currentMoisture = 200;
  if (currentMoisture > 3000) currentMoisture = 3000;
  return currentMoisture;
}

async function sendFakeData() {
  let moisture = generateMoisture();
  let pump = manualPump !== null ? manualPump : (moisture < 1000 ? "ON" : "OFF");

  await fetch('/api/sensor', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ moisture, pump })
  });
}

async function getData() {
  const res = await fetch('/api/sensor');
  const data = await res.json();

  document.getElementById("moisture").innerText = data.moisture;
  document.getElementById("status").innerText =
    data.moisture < 1000 ? "🌵 Dry" : "💧 Optimal";

  const pumpEl = document.getElementById("pump");
  pumpEl.innerText = data.pump;
  pumpEl.className = data.pump === "ON" ? "pump-on" : "pump-off";

  document.getElementById("mode").innerText =
    "Mode: " + (manualPump === null ? "AUTO" : "MANUAL");

  // Alerts
  document.getElementById("alert").innerText =
    data.moisture < 1000 ? "⚠️ Water Needed!" : "✅ Healthy";

  // Stats
  history.push(data.moisture);
  if (history.length > 20) history.shift();

  document.getElementById("avg").innerText =
    "Avg: " + Math.round(history.reduce((a,b)=>a+b,0)/history.length);
  document.getElementById("min").innerText =
    "Min: " + Math.min(...history);
  document.getElementById("max").innerText =
    "Max: " + Math.max(...history);

  if (data.pump === "ON" && lastPumpState === "OFF") pumpCount++;
  lastPumpState = data.pump;
  document.getElementById("pumpCount").innerText =
    "Pump Used: " + pumpCount;

  const time = new Date().toLocaleTimeString();

  if (chart.data.labels.length > 12) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.data.labels.push(time);
  chart.data.datasets[0].data.push(data.moisture);
  chart.update();
}

function turnPumpOn(){ manualPump="ON"; }
function turnPumpOff(){ manualPump="OFF"; }
function autoMode(){ manualPump=null; }

setInterval(()=>{ document.getElementById("clock").innerText=new Date().toLocaleString(); },1000);
setInterval(sendFakeData,2000);
setInterval(getData,2000);
</script>

</body>
</html>
