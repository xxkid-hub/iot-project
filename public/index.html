<!DOCTYPE html>
<html>
<head>
  <title>Smart Plant Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(-45deg, #02070c, #001a14, #001f2b, #02070c);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
      color: white;
      overflow-x: hidden;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🌪️ Glow blobs */
    .bg-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.5;
      z-index: -1;
      animation: floatGlow 12s infinite alternate ease-in-out;
    }

    .bg-glow1 { background: #00ff9f; top: 10%; left: 10%; }
    .bg-glow2 { background: #0099ff; bottom: 10%; right: 10%; }
    .bg-glow3 { background: #ff00ff; top: 50%; left: 60%; }

    @keyframes floatGlow {
      from { transform: translateY(0px); }
      to { transform: translateY(60px); }
    }

    /* 🌌 Particles */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -2;
    }

    h1 {
      text-align:center;
      margin:20px;
      color:#00ff9f;
      text-shadow:0 0 20px #00ff9f;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4,1fr);
      gap:20px;
      padding:20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(0,255,150,0.3);
      border-radius:15px;
      padding:15px;
      box-shadow:0 0 20px rgba(0,255,150,0.2);
      transition:0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow:0 0 30px rgba(0,255,150,0.6);
    }

    .value {
      font-size:1.8rem;
      margin-top:5px;
    }

    button {
      margin:4px;
      padding:6px 10px;
      border:none;
      border-radius:8px;
      background:#00ff9f;
      font-weight:bold;
      cursor:pointer;
    }

    .graph {
      grid-column: span 4;
      background: rgba(255,255,255,0.05);
      border-radius:15px;
      padding:20px;
    }

    canvas { height:300px !important; }
  </style>
</head>

<body>

<!-- 🌪️ Glow -->
<div class="bg-glow bg-glow1"></div>
<div class="bg-glow bg-glow2"></div>
<div class="bg-glow bg-glow3"></div>

<!-- 🌌 Particles -->
<canvas id="particles"></canvas>

<h1>🌱 Smart Plant Dashboard</h1>

<div class="grid">

  <div class="card"><h3>💧 Moisture</h3><div id="moisture" class="value"></div></div>
  <div class="card"><h3>🚿 Pump</h3><div id="pump" class="value"></div></div>
  <div class="card"><h3>🌡️ Temp</h3><div id="temp" class="value"></div></div>
  <div class="card"><h3>💡 Light</h3><div id="light" class="value"></div></div>

  <div class="card"><h3>🌫️ Humidity</h3><div id="humidity" class="value"></div></div>
  <div class="card"><h3>📶 Device</h3><div id="device">🟢 Online</div></div>

  <div class="card">
    <h3>🎛️ Threshold</h3>
    <input type="range" min="500" max="2000" value="1000" id="slider">
    <div id="thVal">1000</div>
  </div>

  <div class="card">
    <h3>🎮 Controls</h3>
    <button onclick="onPump()">ON</button>
    <button onclick="offPump()">OFF</button>
    <button onclick="auto()">AUTO</button>
    <button onclick="dry()">Dry</button>
    <button onclick="wet()">Wet</button>
  </div>

  <div class="graph">
    <canvas id="chart"></canvas>
    <button onclick="reset()">Reset</button>
  </div>

</div>

<script>
let moisture=1500, manual=null, threshold=1000;
let ctx=document.getElementById("chart").getContext("2d");

let chart=new Chart(ctx,{
  type:'line',
  data:{labels:[],datasets:[{data:[],borderColor:'#00ff9f'}]}
});

function updateData(){
  moisture += Math.random()*200-100;

  let temp=Math.floor(Math.random()*10+25);
  let light=Math.floor(Math.random()*1000);
  let humidity=Math.floor(Math.random()*100);

  document.getElementById("moisture").innerText=Math.round(moisture);
  document.getElementById("temp").innerText=temp+"°C";
  document.getElementById("light").innerText=light;
  document.getElementById("humidity").innerText=humidity+"%";

  let pump = manual!==null?manual:(moisture<threshold?"ON":"OFF");
  document.getElementById("pump").innerText=pump;

  let t=new Date().toLocaleTimeString();
  chart.data.labels.push(t);
  chart.data.datasets[0].data.push(moisture);

  if(chart.data.labels.length>20){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
}

function onPump(){manual="ON"}
function offPump(){manual="OFF"}
function auto(){manual=null}
function dry(){moisture=400}
function wet(){moisture=2500}
function reset(){chart.data.labels=[];chart.data.datasets[0].data=[];chart.update()}

document.getElementById("slider").oninput=function(){
  threshold=this.value;
  document.getElementById("thVal").innerText=threshold;
}

setInterval(updateData,2000);

/* 🌌 PARTICLES SCRIPT */
const canvas = document.getElementById("particles");
const ctxp = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    dx: Math.random()-0.5,
    dy: Math.random()-0.5
  });
}

function animateParticles(){
  ctxp.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctxp.beginPath();
    ctxp.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctxp.fillStyle="rgba(0,255,150,0.7)";
    ctxp.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(animateParticles);
}

animateParticles();
</script>

</body>
</html>
