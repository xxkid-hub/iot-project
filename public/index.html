<!DOCTYPE html>
<html>
<head>
  <title>Smart Plant Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #02070c;
      color: white;
    }

    body::before, body::after {
      content: "";
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
    }

    body::before {
      background: rgba(0,255,150,0.25);
      top: -200px;
      left: -200px;
    }

    body::after {
      background: rgba(0,150,255,0.25);
      bottom: -200px;
      right: -200px;
    }

    h1 {
      text-align: center;
      margin: 20px;
      color: #00ff9f;
      text-shadow: 0 0 20px #00ff9f;
    }

    #clock {
      text-align: center;
      opacity: 0.7;
    }

    .container {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 30px;
      padding: 30px;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: rgba(0,255,150,0.05);
      border: 1px solid rgba(0,255,150,0.3);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,255,150,0.2);
    }

    .value {
      font-size: 2rem;
    }

    .pump-on { color: #00ff9f; }
    .pump-off { color: #ff4d6d; }

    /* 🔥 Toggle Switch */
    .toggle {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .switch {
      width: 50px;
      height: 25px;
      background: #333;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
    }

    .switch::after {
      content: "";
      width: 20px;
      height: 20px;
      background: #00ff9f;
      position: absolute;
      top: 2px;
      left: 2px;
      border-radius: 50%;
      transition: 0.3s;
    }

    .switch.active::after {
      left: 26px;
    }

    .graph {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
    }

    canvas {
      width: 100% !important;
      height: 350px !important;
    }

    .alert {
      font-weight: bold;
      margin-top: 10px;
    }

    .critical {
      color: #ff4d6d;
      text-shadow: 0 0 10px red;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

    .desc-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 20px;
    }

    .desc-box {
      padding: 15px;
      border-radius: 12px;
      background: rgba(0,255,150,0.05);
      border: 1px solid rgba(0,255,150,0.3);
      box-shadow: 0 0 10px rgba(0,255,150,0.3);
    }

  </style>
</head>

<body>

<h1>🌱 Smart Plant Control Panel</h1>
<p id="clock"></p>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <div class="card">
      <h3>💧 Moisture</h3>
      <div class="value" id="moisture">--</div>
      <div id="status"></div>
      <div id="prediction"></div>
    </div>

    <div class="card">
      <h3>🚿 Pump</h3>
      <div class="value" id="pump">--</div>

      <button onclick="turnPumpOn()">ON</button>
      <button onclick="turnPumpOff()">OFF</button>

      <div class="toggle">
        <span>AUTO</span>
        <div id="switch" class="switch active" onclick="toggleMode()"></div>
      </div>

      <div id="reason"></div>
    </div>

    <div class="card">
      <h3>📊 Stats</h3>
      <div id="avg"></div>
      <div id="min"></div>
      <div id="max"></div>
    </div>

    <div class="alert" id="alert"></div>

  </div>

  <!-- RIGHT -->
  <div class="graph">
    <canvas id="chart"></canvas>
  </div>

</div>

<div class="desc-row">
  <div class="desc-box">💧 Moisture = soil water level</div>
  <div class="desc-box">🚿 Pump = controls water flow</div>
  <div class="desc-box">🤖 Mode = auto or manual control</div>
</div>

<script>
let currentMoisture = 1500;
let autoModeOn = true;
let history = [];

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      {
        label: 'Moisture',
        data: [],
        borderColor: '#00ff9f',
        tension: 0.4
      },
      {
        label: 'Dry Line',
        data: Array(20).fill(1000),
        borderColor: 'red',
        borderDash: [5,5]
      },
      {
        label: 'Ideal Line',
        data: Array(20).fill(2000),
        borderColor: 'green',
        borderDash: [5,5]
      }
    ]
  }
});

function generateMoisture() {
  let change = Math.random()*200 - 100;
  currentMoisture += change;
  if(currentMoisture<200) currentMoisture=200;
  if(currentMoisture>3000) currentMoisture=3000;
  return Math.round(currentMoisture);
}

async function sendFakeData() {
  let moisture = generateMoisture();
  let pump = autoModeOn ? (moisture<1000?"ON":"OFF") : "OFF";

  await fetch('/api/sensor',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({moisture,pump})
  });
}

async function getData(){
  const res = await fetch('/api/sensor');
  const data = await res.json();

  document.getElementById("moisture").innerText = data.moisture;

  let status="";
  if(data.moisture<500) status="🚨 Critical";
  else if(data.moisture<1000) status="🌵 Dry";
  else if(data.moisture<2500) status="💧 Good";
  else status="🌊 Overwatered";

  document.getElementById("status").innerText=status;

  document.getElementById("prediction").innerText =
    "Prediction: Soil drying in ~"+Math.floor(Math.random()*20)+" sec";

  document.getElementById("pump").innerText=data.pump;
  document.getElementById("pump").className =
    data.pump==="ON"?"pump-on":"pump-off";

  document.getElementById("reason").innerText =
    autoModeOn ? "Auto: Based on moisture" : "Manual Control";

  // ALERT
  let alert=document.getElementById("alert");
  if(data.moisture<500){
    alert.innerText="🚨 Critical Dry!";
    alert.className="alert critical";
  } else if(data.moisture<1000){
    alert.innerText="⚠️ Water Needed!";
    alert.className="alert";
  } else {
    alert.innerText="✅ Healthy";
    alert.className="alert";
  }

  history.push(data.moisture);
  if(history.length>20) history.shift();

  document.getElementById("avg").innerText =
    "Avg: "+Math.round(history.reduce((a,b)=>a+b,0)/history.length);
  document.getElementById("min").innerText="Min: "+Math.min(...history);
  document.getElementById("max").innerText="Max: "+Math.max(...history);

  const time=new Date().toLocaleTimeString();

  if(chart.data.labels.length>20){
    chart.data.labels.shift();
    chart.data.datasets.forEach(d=>d.data.shift());
  }

  chart.data.labels.push(time);
  chart.data.datasets[0].data.push(data.moisture);
  chart.update();
}

function toggleMode(){
  autoModeOn=!autoModeOn;
  document.getElementById("switch").classList.toggle("active");
}

function turnPumpOn(){ autoModeOn=false; }
function turnPumpOff(){ autoModeOn=false; }

setInterval(()=>{document.getElementById("clock").innerText=new Date().toLocaleString()},1000);
setInterval(sendFakeData,2000);
setInterval(getData,2000);
</script>

</body>
</html>
